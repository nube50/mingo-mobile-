name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Capacitor CLI
        run: npm install -D @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          
          # Intentar múltiples veces con log completo
          for i in 1 2 3; do
            echo "========== Build attempt $i ==========" 
            if ./gradlew clean assembleDebug --no-daemon --info 2>&1 | tee ../full-gradle.log; then
              echo "========== Build attempt $i SUCCEEDED =========="
              break
            else
              echo "========== Build attempt $i FAILED =========="
              sleep 10
            fi
          done

      - name: Show result
        run: |
          echo "=== Full Gradle Log (last 200 lines) ==="
          tail -200 full-gradle.log
          
          echo "=== Checking for APK ==="
          find android -name "*.apk" -type f || echo "NO APK FOUND"
          ls -la android/app/build/outputs/ || echo "No outputs"
          ls -la android/app/build/outputs/apk/ || echo "No apk"
          ls -la android/app/build/outputs/apk/debug/ || echo "No debug"

      - name: Upload full log
        uses: actions/upload-artifact@v4
        with:
          name: full-gradle-log
          path: full-gradle.log

      - name: Upload all outputs
        uses: actions/upload-artifact@v4
        with:
          name: all-outputs
          path: android/app/build/
