name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Capacitor CLI
        run: npm install -D @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        id: build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee ../gradle.log
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT
        
      - name: Print Gradle log on failure
        if: failure()
        run: cat gradle.log

      - name: Upload Gradle log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: gradle.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mingo-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
