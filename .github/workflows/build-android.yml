name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Capacitor CLI
        run: npm install -D @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          
          for i in 1 2 3 4 5; do
            echo "=== Build attempt $i ==="
            if ./gradlew clean assembleDebug --no-daemon 2>&1 | tee gradle.log; then
              echo "Build successful!"
              cat gradle.log | tail -50
              break
            else
              echo "Attempt $i failed..."
              cat gradle.log | tail -50
              sleep 10
            fi
          done

      - name: Debug outputs
        run: |
          echo "=== Outputs ==="
          ls -la android/app/build/outputs/ || echo "No outputs dir"
          ls -la android/app/build/outputs/apk/ || echo "No apk dir"  
          ls -la android/app/build/outputs/apk/debug/ || echo "No debug dir"
          find android -name "*.apk" || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mingo-debug.apk
          path: android/app/build/outputs/apk/debug/
