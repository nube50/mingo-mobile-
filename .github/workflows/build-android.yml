name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Capacitor CLI
        run: npm install -D @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          
          # Intentar múltiples veces
          for i in 1 2 3 4 5; do
            echo "=== Intento de build $i ==="
            if ./gradlew clean assembleDebug --no-daemon 2>&1 | tee ../gradle.log; then
              echo "Build exitoso!"
              break
            else
              echo "Intento $i falló..."
              sleep 10
            fi
          done
          
          # Siempre verificar si existe el APK
          echo "=== Verificando APK ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No existe directorio"
          find . -name "*.apk" -type f 2>/dev/null || echo "No se encontraron APKs"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mingo-debug.apk
          path: android/app/build/outputs/apk/debug/
