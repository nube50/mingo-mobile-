name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Capacitor CLI
        run: npm install -D @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          
          for i in 1 2 3 4 5; do
            echo "=== Build attempt $i ==="
            if ./gradlew clean assembleDebug --no-daemon 2>&1; then
              echo "Build succeeded!"
              break
            else
              echo "Build attempt $i failed..."
              sleep 10
            fi
          done

      - name: Find and copy APK
        run: |
          APK_DIR="android/app/build/outputs/apk/debug"
          if [ -d "$APK_DIR" ]; then
            echo "APK directory exists"
            ls -la "$APK_DIR"
            cp "$APK_DIR"/*.apk . 2>/dev/null || echo "No APK files to copy"
            ls -la *.apk 2>/dev/null || echo "No APK files found"
          else
            echo "APK directory doesn't exist"
            find android -name "*.apk" -type f
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mingo-debug.apk
          path: .
          if-no-files-found: error
