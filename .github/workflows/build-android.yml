name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Capacitor CLI
        run: npm install -D @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          
          for i in 1 2 3 4 5; do
            echo "=== Build attempt $i ==="
            if ./gradlew clean assembleDebug --no-daemon; then
              echo "Build successful!"
              exit 0
            else
              echo "Attempt $i failed..."
              sleep 10
            fi
          done
          exit 1

      - name: Debug - List build outputs
        run: |
          echo "=== Checking outputs ==="
          ls -la android/app/build/outputs/
          echo "=== Checking APK folder ==="
          ls -la android/app/build/outputs/apk/
          echo "=== Checking debug folder ==="
          ls -la android/app/build/outputs/apk/debug/ || echo "No debug folder"
          echo "=== Find APK ==="
          find android -name "*.apk"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mingo-debug.apk
          path: android/app/build/outputs/apk/debug/
